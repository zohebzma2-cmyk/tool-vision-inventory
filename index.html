<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1 + user-scalable=no stops iOS from auto-zooming on input focus and
         from stray pinch-zoom, which reads as random zoom-ins in a native WebView app. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Tool Vision — garage tool inventory</title>
    <meta name="description" content="Map your garage into labeled slots with AI, print QR labels, and never lose a tool." />
    <meta name="theme-color" content="#14181d" />

    <!-- Machinist type system: Barlow Condensed for engraved display caps, IBM Plex Mono for codes/specs. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tool Vision" />

    <meta property="og:title" content="Tool Vision" />
    <meta property="og:description" content="Map your garage into labeled slots with AI, print QR labels, and never lose a tool." />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
